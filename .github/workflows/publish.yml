name: publish
on:
  push:
    tags: ['v*']
jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish (fails-graceful)
        run: npm publish --access public || echo "npm publish skipped (missing NPM_TOKEN or already published)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
